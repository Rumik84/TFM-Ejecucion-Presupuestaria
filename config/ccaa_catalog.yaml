# ============================================================================
#  Catálogo de Comunidades Autónomas (CCAA) y Ciudades Autónomas de España
#
#  Cada entrada define:
#    - slug: identificador interno usado en rutas de carpetas del data lake
#    - nombre: nombre oficial
#    - uri_nti: identificador URI NTI usado en la API datos.gob.es para
#      filtrar por /catalog/dataset/spatial/Autonomia/{uri_nti}
#    - cobertura: "muy_alta" | "alta" | "media" | "baja" | "sin_datos"
#                 según el inventario base (ver Resumen_datasets_datos_gob_es.md)
#    - publishers: IDs DIR3 de publicadores clave con datos presupuestarios
# ============================================================================
ccaa:
  - slug: andalucia
    nombre: Andalucía
    uri_nti: Andalucia
    cobertura: baja
    publishers: []

